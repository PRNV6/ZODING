<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Quote Generator</title>
    <style>
        body {
            text-align: center;
            margin-top: 50px;
            font-family: Arial, sans-serif;
            background-color: #fff8dc;
        }

        #quote {
            color: brown;
            font-size: 24px;
            margin: 20px 0;
        }

        button {
            padding: 10px 18px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: orange;
            color: white;
        }

        button:hover {
            background-color: darkorange;
        }
    </style>
</head>
<body>

    <h2>Dynamic Quote Generator using JS and DOM</h2>
    <h3 id="quote">Click the buttons to see quotes</h3>

    <button onclick="showQuote()">Show Quote</button>
    <button onclick="changeColor()">Change Color</button>
    <button onclick="changeBackground()">Change Background</button>
    <button onclick="resetPage()">Reset</button>

    <script>
        function showQuote() {
            document.getElementById("quote").innerHTML =
            "Success is the sum of small efforts repeated daily.";
        }

        function changeColor() {
            document.getElementById("quote").style.color = "green";
        }

        function changeBackground() {
            document.body.style.backgroundColor = "lightpink";
        }

        function resetPage() {
            document.getElementById("quote").innerHTML = "Click the buttons to see quotes";
            document.getElementById("quote").style.color = "brown";
            document.body.style.backgroundColor = "#fff8dc";
        }
    </script>

</body>
</html>
